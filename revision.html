<!DOCTYPE html>
<html>
<head>
  <title>Revision Dashboard</title>
  <link rel="stylesheet" href="revision.css">
</head>
<body>

  <h1>📚 Revision Dashboard</h1>

  <a href="index.html" class="back">
    ⬅ Back to Tools
  </a>

  <!-- SUBJECT FILTER BUTTONS -->
  <div id="subjectTabs" class="tabs"></div>

  <!-- INPUT SECTION -->
  <div class="input-box">

    <input
      type="text"
      id="subject"
      placeholder="Enter subject"
    >

    <input
      type="text"
      id="title"
      placeholder="Enter chapter/topic"
    >

    <input
      type="date"
      id="date"
    >

    <button onclick="addItem()">
      Add
    </button>

  </div>

  <!-- EXPORT -->
  <div class="export-box">
    <button onclick="exportCSV()">
      ⬇ Export CSV
    </button>
  </div>

  <h2 id="currentView">
    📊 All Subjects
  </h2>

  <!-- TABLE -->
  <div class="table-wrapper">
    <table id="table"></table>
  </div>

  <script src="revision.js"></script>

</body>
  </html>
